services:
  # Telemetría / datos no estructurados. Es lo ÚNICO imprescindible de docker-compose:
  # la DB relacional + Auth ahora vive en Supabase (`supabase start`, Postgres :54322).
  mongodb:
    image: mongo:7.0-rc
    container_name: innova-mongo-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: innova_mongo_secret
      MONGO_INITDB_DATABASE: innova_telemetry_local
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Opcional — SQS + S3 emulados para correr el pipeline ASÍNCRONO v9 en vivo
  # (ingesta de guías, generación de pautas, corrección de fotos) tal cual prod.
  # Levántalo SOLO cuando lo necesites:  docker compose up -d localstack
  localstack:
    image: localstack/localstack:3
    container_name: innova-localstack-dev
    ports:
      - "4566:4566"
    environment:
      SERVICES: "sqs,s3"
      DEBUG: "0"
      PERSISTENCE: "0"
    volumes:
      - localstack_data:/var/lib/localstack
    restart: unless-stopped

volumes:
  mongodb_data:
  localstack_data:
