version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: innova-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: innova_secret
      POSTGRES_DB: innova_dev_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
