service: innova-backend-serverless
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
            - sqs:GetQueueUrl
          Resource:
            - {"Fn::GetAtt": ["AttemptStreamQueue", "Arn"]}
            - {"Fn::GetAtt": ["LlmClassifyQueue", "Arn"]}
            - {"Fn::GetAtt": ["LlmClassifyDLQ", "Arn"]}
            - {"Fn::GetAtt": ["OcrQueue", "Arn"]}
            - {"Fn::GetAtt": ["AttemptReprocessQueue", "Arn"]}
            - {"Fn::GetAtt": ["GuideIngestQueue", "Arn"]}
            - {"Fn::GetAtt": ["SolutionGenQueue", "Arn"]}
            - {"Fn::GetAtt": ["SubmissionGradeQueue", "Arn"]}
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - {"Fn::Sub": "arn:aws:s3:::${self:service}-${self:provider.stage}-ocr-uploads/*"}
            - {"Fn::Sub": "arn:aws:s3:::${self:service}-${self:provider.stage}-guides/*"}
            - {"Fn::Sub": "arn:aws:s3:::innova-submissions-${self:provider.stage}/*"}
  environment:
    NODE_ENV: ${self:provider.stage}
    DATABASE_URL: ${env:DATABASE_URL, ''}
    MONGODB_URI: ${env:MONGODB_URI, ''}
    PUBLIC_APP_URL: ${env:PUBLIC_APP_URL, ''}
    PUBLIC_API_URL: ${env:PUBLIC_API_URL, ''}
    PUBLIC_PRACTICE_URL: ${env:PUBLIC_PRACTICE_URL, ''}
    CORS_ORIGINS: ${env:CORS_ORIGINS, ''}

    SUPABASE_URL: ${env:SUPABASE_URL, ''}
    SUPABASE_SERVICE_ROLE_KEY: ${env:SUPABASE_SERVICE_ROLE_KEY, ''}
    SUPABASE_ANON_KEY: ${env:SUPABASE_ANON_KEY, ''}
    SQS_ATTEMPT_STREAM_URL: {"Ref": "AttemptStreamQueue"}
    SQS_LLM_CLASSIFY_URL: {"Ref": "LlmClassifyQueue"}
    SQS_OCR_QUEUE_URL: {"Ref": "OcrQueue"}
    SQS_ATTEMPT_REPROCESS_URL: {"Ref": "AttemptReprocessQueue"}
    SQS_GUIDE_INGEST_URL: {"Ref": "GuideIngestQueue"}
    SQS_SOLUTION_GEN_URL: {"Ref": "SolutionGenQueue"}
    SQS_SUBMISSION_GRADE_URL: {"Ref": "SubmissionGradeQueue"}
    S3_GUIDES_BUCKET: ${self:service}-${self:provider.stage}-guides
    S3_SUBMISSIONS_BUCKET: innova-submissions-${self:provider.stage}
    GUIDES_PRESIGNED_PUT_TTL: ${env:GUIDES_PRESIGNED_PUT_TTL, '600'}
    GUIDES_PRESIGNED_GET_TTL: ${env:GUIDES_PRESIGNED_GET_TTL, '300'}
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY, ''}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}
    RESEND_API_KEY: ${env:RESEND_API_KEY, ''}
    RESEND_FROM_EMAIL: ${env:RESEND_FROM_EMAIL, ''}

    LOG_LEVEL: ${env:LOG_LEVEL, 'info'}

custom:
  customDomain:
    domainName: api.superprofes.app
    basePath: ''
    stage: ${self:provider.stage}
    createRoute53Record: false   # DNS gestionado en name.com, no Route53
    endpointType: REGIONAL
    securityPolicy: tls_1_2
    autoDomain: false

  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    concurrency: 4
    keepNames: true
    external:
      - '@nestjs/microservices'
      - '@nestjs/websockets'
      - 'class-transformer/storage'
    packager: pnpm

functions:
  api:
    handler: src/lambda.handler
    timeout: 30
    memorySize: 512
    events:
      - http:
          method: ANY
          path: /
      - http:
          method: ANY
          path: '{proxy+}'

  telemetryWorker:
    handler: src/infrastructure/workers/telemetry-persister.handler.handler
    timeout: 60
    memorySize: 256
    events:
      - sqs:
          arn: {"Fn::GetAtt": ["AttemptStreamQueue", "Arn"]}
          batchSize: 10
          functionResponseType: ReportBatchItemFailures

  llmClassifierWorker:
    handler: src/infrastructure/workers/llm-classifier.handler.handler
    timeout: 120
    memorySize: 512
    events:
      - sqs:
          arn: {"Fn::GetAtt": ["LlmClassifyQueue", "Arn"]}
          batchSize: 20
          maximumBatchingWindow: 60
          functionResponseType: ReportBatchItemFailures

  ocrWorker:
    handler: src/infrastructure/workers/ocr-worker.handler.handler
    timeout: 60
    memorySize: 512
    events:
      - s3:
          bucket: ${self:service}-${self:provider.stage}-ocr-uploads
          event: s3:ObjectCreated:*
          existing: true

  alertGenerator:
    handler: src/infrastructure/workers/alert-generator.handler.handler
    timeout: 60
    memorySize: 256
    events:
      - schedule: rate(1 hour)

  attemptReprocessWorker:
    handler: src/infrastructure/workers/attempt-reprocess.worker.handler
    timeout: 60
    memorySize: 256
    events:
      - sqs:
          arn: {"Fn::GetAtt": ["AttemptReprocessQueue", "Arn"]}
          batchSize: 10
          functionResponseType: ReportBatchItemFailures

resources:
  Resources:
    AttemptStreamQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-attempt-stream.fifo
        FifoQueue: true
        ContentBasedDeduplication: true
        MessageRetentionPeriod: 86400
        VisibilityTimeout: 60

    LlmClassifyQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-llm-classify-queue
        MessageRetentionPeriod: 86400
        VisibilityTimeout: 360
        RedrivePolicy:
          deadLetterTargetArn: {"Fn::GetAtt": ["LlmClassifyDLQ", "Arn"]}
          maxReceiveCount: 3

    LlmClassifyDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-llm-classify-dlq
        MessageRetentionPeriod: 1209600

    OcrQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-ocr-queue
        MessageRetentionPeriod: 86400
        VisibilityTimeout: 60

    AttemptReprocessQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-attempt-reprocess-queue
        MessageRetentionPeriod: 86400
        VisibilityTimeout: 60
        RedrivePolicy:
          deadLetterTargetArn: {"Fn::GetAtt": ["AttemptReprocessDLQ", "Arn"]}
          maxReceiveCount: 5

    AttemptReprocessDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-attempt-reprocess-dlq
        MessageRetentionPeriod: 1209600

    # ---- v9 guides pipeline queues (consumers live in innova-ai-engine) ----
    GuideIngestQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-guide-ingest-queue
        MessageRetentionPeriod: 86400
        VisibilityTimeout: 900
        RedrivePolicy:
          deadLetterTargetArn: {"Fn::GetAtt": ["GuideIngestDLQ", "Arn"]}
          maxReceiveCount: 3

    GuideIngestDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-guide-ingest-dlq
        MessageRetentionPeriod: 1209600

    SolutionGenQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-solution-generation-queue
        MessageRetentionPeriod: 86400
        VisibilityTimeout: 900
        RedrivePolicy:
          deadLetterTargetArn: {"Fn::GetAtt": ["SolutionGenDLQ", "Arn"]}
          maxReceiveCount: 3

    SolutionGenDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-solution-generation-dlq
        MessageRetentionPeriod: 1209600

    SubmissionGradeQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-submission-grade-queue
        MessageRetentionPeriod: 86400
        VisibilityTimeout: 180
        RedrivePolicy:
          deadLetterTargetArn: {"Fn::GetAtt": ["SubmissionGradeDLQ", "Arn"]}
          maxReceiveCount: 3

    SubmissionGradeDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-submission-grade-dlq
        MessageRetentionPeriod: 1209600

    OcrUploadsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-ocr-uploads
        LifecycleConfiguration:
          Rules:
            - Id: PurgeAfter30Days
              Status: Enabled
              ExpirationInDays: 30

    # ---- v9 guides storage (ADR-123) ----
    GuidesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-guides
        CorsConfiguration:
          CorsRules:
            - AllowedMethods: [PUT, GET]
              AllowedOrigins: ['*']
              AllowedHeaders: ['*']
              MaxAge: 3000
        LifecycleConfiguration:
          Rules:
            - Id: PurgeUploadsAfter1Year
              Status: Enabled
              Prefix: guides/uploads/
              ExpirationInDays: 365

    SubmissionsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: innova-submissions-${self:provider.stage}
        CorsConfiguration:
          CorsRules:
            - AllowedMethods: [PUT, GET]
              AllowedOrigins: ['*']
              AllowedHeaders: ['*']
              MaxAge: 3000
        LifecycleConfiguration:
          Rules:
            - Id: PurgePhotosAfter30Days
              Status: Enabled
              ExpirationInDays: 30

  Outputs:
    LlmClassifyQueueArn:
      Value: {"Fn::GetAtt": ["LlmClassifyQueue", "Arn"]}
      Export:
        Name: innova-${self:provider.stage}-LlmClassifyQueueArn

    GuideIngestQueueArn:
      Value: {"Fn::GetAtt": ["GuideIngestQueue", "Arn"]}
      Export:
        Name: innova-${self:provider.stage}-GuideIngestQueueArn

    SolutionGenQueueArn:
      Value: {"Fn::GetAtt": ["SolutionGenQueue", "Arn"]}
      Export:
        Name: innova-${self:provider.stage}-SolutionGenQueueArn

    SubmissionGradeQueueArn:
      Value: {"Fn::GetAtt": ["SubmissionGradeQueue", "Arn"]}
      Export:
        Name: innova-${self:provider.stage}-SubmissionGradeQueueArn

    AttemptReprocessQueueArn:
      Value: {"Fn::GetAtt": ["AttemptReprocessQueue", "Arn"]}
      Export:
        Name: innova-${self:provider.stage}-AttemptReprocessQueueArn

plugins:
  - serverless-esbuild
  - serverless-domain-manager
  - serverless-offline
