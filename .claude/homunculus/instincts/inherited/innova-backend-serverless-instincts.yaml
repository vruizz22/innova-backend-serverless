# Innova Backend Serverless Workflow Database Schema Migration And Seed Update

## Action

Follow the database-schema-migration-and-seed-update workflow:
1. Edit prisma/schema.prisma to define new/changed tables or fields
2. Generate new migration in prisma/migrations/
3. Update prisma/seed.ts and/or prisma/demo-identities.ts for new data
4. Optionally update prisma.config.ts
5. Commit all related files together

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: prisma/schema.prisma, prisma/migrations/*/migration.sql, prisma/seed.ts

