# Innova Backend Serverless Workflow Add New Module Or Feature

## Action

Follow the add-new-module-or-feature workflow:
1. Create new controller file(s) in src/modules/[feature]/
2. Create new service file(s) in src/modules/[feature]/
3. Add DTOs in src/modules/[feature]/dto/
4. Add or update module registration in src/modules/[feature]/[feature].module.ts
5. Write corresponding *.spec.ts test files for controller/service
6. Optionally update shared domain/types if needed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/modules/*/*.controller.ts, src/modules/*/*.service.ts, src/modules/*/*.module.ts

