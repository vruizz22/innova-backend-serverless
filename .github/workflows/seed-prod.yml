# Private, manual-only seed of the PROD environment (Supabase Auth + Postgres demo data).
# There is NO push/schedule trigger on purpose: only repo collaborators (i.e. you) can run
# this from the Actions tab. No public endpoint is exposed by the app.
name: Seed prod (private)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type SEED to confirm you want to (re)seed the PROD database + Supabase Auth"
        required: true
        default: ""
      run_migrations:
        description: "Run `prisma migrate deploy` before seeding"
        type: boolean
        default: false

concurrency:
  group: seed-prod
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — require explicit confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "SEED" ]; then
            echo "::error::You must type SEED in the confirm input to proceed."
            exit 1
          fi

      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma generate

      - name: Run migrations (optional)
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Provision Supabase Auth demo users
        run: pnpm seed:auth
        env:
          ALLOW_SEED: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEED_DEMO_PASSWORD: ${{ secrets.SEED_DEMO_PASSWORD }}

      - name: Seed Postgres demo data
        run: pnpm prisma db seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
